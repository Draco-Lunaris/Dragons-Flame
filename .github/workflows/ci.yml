name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Server security audit (informational)
        continue-on-error: true
        run: npm audit || true

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Client security audit (informational)
        continue-on-error: true
        working-directory: client
        run: npm audit || true

      - name: Run client tests
        working-directory: client
        run: npm test -- --watchAll=false

      - name: Build client
        working-directory: client
        run: npm run build
